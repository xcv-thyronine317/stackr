name: release

# Build, sign, and publish a Windows release straight to THIS repo's Releases.
# The in-app updater fetches (unauthenticated):
#   https://github.com/igrdkl/stackr/releases/latest/download/latest.json
# Because the repo is public, its own release assets are reachable without a
# token — so no cross-repo hosting and no PAT are needed; the default
# GITHUB_TOKEN is enough.
#
# Required repo secrets (Settings → Secrets and variables → Actions):
#   TAURI_SIGNING_PRIVATE_KEY           contents of the updater private key file
#   TAURI_SIGNING_PRIVATE_KEY_PASSWORD  its password (empty string if none)
#
# Release flow: bump the version, tag `vX.Y.Z`, push the tag. tauri-action
# builds, signs, and creates the Release with the installer + latest.json.

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install frontend deps
        run: npm ci

      - name: Build, sign & publish release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: Stackr ${{ github.ref_name }}
          releaseBody: Download the installer below. Existing installs update automatically.
          releaseDraft: false
          prerelease: false
